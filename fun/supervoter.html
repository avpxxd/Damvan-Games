<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperVoter</title>
    <!-- Core Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #020617; margin: 0; overflow: hidden; }
        
        /* Physics Animations */
        @keyframes plummet { 
            0% { transform: translate(0,0) rotate(0); opacity: 1; } 
            100% { transform: translate(40px, 1500px) rotate(120deg); opacity: 0; } 
        }
        @keyframes plummet-bar { 
            0% { transform: translate(0,0) rotate(0); opacity: 1; } 
            100% { transform: translate(-60px, 1500px) rotate(-30deg); opacity: 0; } 
        }
        @keyframes float-recover { 
            0% { transform: translateY(-1000px) rotate(-45deg); opacity: 0; } 
            70% { transform: translateY(30px) rotate(10deg); opacity: 1; } 
            100% { transform: translateY(0) rotate(0); opacity: 1; } 
        }
        
        /* Chaos Shakes */
        @keyframes shake-1 { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-2px, 1px); } 75% { transform: translate(2px, -1px); } }
        @keyframes shake-2 { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 3px); } 75% { transform: translate(5px, -3px); } }
        @keyframes shake-3 { 0%, 100% { transform: translate(0,0); } 10% { transform: translate(-10px, -10px); } 50% { transform: translate(15px, 15px); } 90% { transform: translate(-10px, 10px); } }
        
        /* Effects */
        @keyframes pop { 0% { transform: translate(0,0) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--rot)); opacity: 0; } }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        @keyframes dangle { 0%, 100% { transform: rotate(0); transform-origin: top center; } 50% { transform: rotate(15deg); transform-origin: top center; } }
        @keyframes glitch { 0%, 100% { transform: skew(0); filter: blur(0); } 20% { transform: skew(10deg); filter: blur(2px) hue-rotate(90deg); } 40% { transform: skew(-10deg); filter: blur(1px); } }

        .s-1 { animation: shake-1 0.1s infinite; }
        .s-2 { animation: shake-2 0.08s infinite; }
        .s-3 { animation: shake-3 0.05s infinite; }
        .fall { animation: plummet 1.2s forwards cubic-bezier(0.5, 0, 1, 1); }
        .fall-bar { animation: plummet-bar 1.2s forwards cubic-bezier(0.5, 0, 1, 1); animation-delay: 0.45s; }
        .rec { animation: float-recover 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .glitch { animation: glitch 0.1s infinite; }
        .spin { animation: spin 0.5s linear infinite; }
        .dan { animation: dangle 1.5s ease-in-out infinite; }
        .particle { animation: pop 1s forwards ease-out; position: absolute; pointer-events: none; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const playSound = (frequency, type = 'sine', duration = 0.1, volume = 0.05) => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(frequency * 0.5, audioCtx.currentTime + duration);
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
                setTimeout(() => { if (audioCtx.state !== 'closed') audioCtx.close(); }, duration * 1000 + 200);
            } catch (e) {}
        };

        const App = () => {
            // Epilepsy Warning State
            const [showWarning, setShowWarning] = useState(true);

            // Local tracking using State + localStorage
            const [pollData, setPollData] = useState(() => {
                const saved = localStorage.getItem('supervoter_data');
                return saved ? JSON.parse(saved) : { optionA: 0, optionB: 0 };
            });
            const [particles, setParticles] = useState([]);
            const [combo, setCombo] = useState(0);
            const [isRecovering, setIsRecovering] = useState(false);
            const [lastMaxCombo, setLastMaxCombo] = useState(0);
            const [lastClickTime, setLastClickTime] = useState(0);
            const [isCrashed, setIsCrashed] = useState(false);
            const [reloadClicks, setReloadClicks] = useState(0);
            
            const comboTimeoutRef = useRef(null);
            const prevComboRef = useRef(0);

            const EMOJIS = ['🔥', '⚡', '🚀', '⭐', '💥', '✨', '👑', '💎', '🌈', '🧨', '👾', '🌀', '💀'];
            const COLORS = ['#ef4444', '#3b82f6', '#fbbf24', '#22c55e', '#a855f7', '#ec4899'];

            useEffect(() => {
                localStorage.setItem('supervoter_data', JSON.stringify(pollData));
            }, [pollData]);

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = Date.now();
                    setParticles(prev => prev.filter(p => now - p.startTime < 1500));
                }, 100);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (combo >= 1000 && !isCrashed) {
                    setIsCrashed(true);
                    setCombo(0);
                    setReloadClicks(0);
                    playSound(40, 'square', 0.6, 0.1);
                }
                
                if (combo === 0 && prevComboRef.current > 0) {
                    setLastMaxCombo(prevComboRef.current);
                    if (prevComboRef.current > 50) {
                        setIsRecovering(true);
                        setTimeout(() => {
                            setIsRecovering(false);
                            setLastMaxCombo(0);
                        }, 3000);
                    }
                }
                prevComboRef.current = combo;
            }, [combo, isCrashed]);

            useEffect(() => {
                if (reloadClicks >= 200 && isCrashed) {
                    setTimeout(() => {
                        setIsCrashed(false);
                        setReloadClicks(0);
                        setCombo(0);
                        setLastMaxCombo(1000);
                        setIsRecovering(true);
                        setTimeout(() => {
                            setIsRecovering(false);
                            setLastMaxCombo(0);
                        }, 4000);
                    }, 4000);
                }
            }, [reloadClicks, isCrashed]);

            const generateParticles = (x, y, count, scale = 1) => {
                const now = Date.now();
                const newParticles = Array.from({ length: count }).map((_, idx) => ({
                    id: `${now}-${idx}-${Math.random()}`,
                    startTime: now,
                    x: x,
                    y: y,
                    tx: (Math.random() - 0.5) * (600 * scale), 
                    ty: -Math.random() * (500 * scale) - 100,  
                    emoji: Math.random() > 0.6 ? EMOJIS[Math.floor(Math.random() * EMOJIS.length)] : null,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    size: 8 + Math.random() * 20,
                    rotation: Math.random() * 720
                }));
                setParticles(prev => [...prev, ...newParticles]);
            };

            const handleSpam = useCallback((option, isLeft) => {
                if (isCrashed) return;
                const now = Date.now();
                const newCombo = now - lastClickTime < 450 ? combo + 1 : 1;
                setCombo(newCombo);
                setLastClickTime(now);

                playSound(140 + (Math.min(newCombo, 500) * 3), newCombo > 700 ? 'sawtooth' : 'sine', 0.15);

                if (newCombo >= 20) {
                    let burstCount = newCombo >= 600 ? 20 : 4;
                    generateParticles(isLeft ? 30 : 70, 45, burstCount, newCombo > 300 ? 1.5 : 1);
                }

                setPollData(prev => ({
                    ...prev,
                    [option]: prev[option] + 1
                }));

                if (comboTimeoutRef.current) clearTimeout(comboTimeoutRef.current);
                comboTimeoutRef.current = setTimeout(() => setCombo(0), 1200);
            }, [combo, lastClickTime, isCrashed]);

            const handleReloadClick = () => {
                const newCount = reloadClicks + 1;
                setReloadClicks(newCount);
                playSound(220 + (Math.min(newCount, 150) * 4), 'sine', 0.1, 0.08);
            };

            const total = pollData.optionA + pollData.optionB;
            const percA = total === 0 ? 50 : (pollData.optionA / total) * 100;
            const percB = total === 0 ? 50 : (pollData.optionB / total) * 100;
            const leastClicked = pollData.optionA <= pollData.optionB ? 'A' : 'B';

            // --- EPILEPSY WARNING PANEL ---
            if (showWarning) {
                return (
                    <div className="fixed inset-0 z-[300] bg-slate-950 flex items-center justify-center p-6 select-none">
                        <div className="max-w-md w-full bg-slate-900 border-2 border-yellow-500/30 rounded-[2.5rem] p-8 md:p-12 text-center space-y-8 shadow-2xl animate-in zoom-in-95 duration-500">
                            <div className="flex justify-center">
                                <div className="bg-yellow-500/10 p-4 rounded-full">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                                    </svg>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h2 className="text-3xl font-black italic tracking-tighter text-white uppercase">Epilepsy Warning</h2>
                                <p className="text-slate-400 text-sm leading-relaxed">
                                    This application contains <span className="text-yellow-500 font-bold">flashing lights</span>, <span className="text-yellow-500 font-bold">intense color shifts</span>, and <span className="text-yellow-500 font-bold">screen shaking effects</span> that may trigger photosensitive seizures in certain individuals.
                                </p>
                            </div>
                            <button 
                                onClick={() => {
                                    setShowWarning(false);
                                    playSound(440, 'sine', 0.1, 0.05);
                                }}
                                className="w-full bg-yellow-500 hover:bg-yellow-400 active:scale-95 transition-all text-black font-black text-xl py-4 rounded-full shadow-[0_4px_0_#ca8a04]"
                            >
                                I UNDERSTAND
                            </button>
                        </div>
                    </div>
                );
            }

            // --- CRASHED UI ---
            if (isCrashed) {
                const showBar = reloadClicks >= 1; 
                const hideErrorText = reloadClicks >= 20; 
                const showTitleYellow = reloadClicks >= 50; 
                const isDarkening = reloadClicks >= 100; 
                const isRebooting = reloadClicks >= 200;

                return (
                    <div className={`min-h-screen flex flex-col items-center justify-center p-6 select-none ${isDarkening ? 'bg-slate-950 transition-colors duration-[2000ms]' : 'bg-white'}`}>
                        <div className="fixed inset-0 pointer-events-none z-[100]">
                            {particles.map(p => (
                                <div key={p.id} className="particle" style={{ left: `${p.x}%`, top: `${p.y}%`, '--tx': `${p.tx}px`, '--ty': `${p.ty}px`, '--rot': `${p.rotation}deg`, fontSize: `${p.size}px`, backgroundColor: p.emoji ? 'transparent' : p.color, width: p.emoji ? 'auto' : '6px', height: p.emoji ? 'auto' : '6px', borderRadius: '2px' }}>{p.emoji}</div>
                            ))}
                        </div>
                        <div className="w-full max-w-xl flex flex-col items-center min-h-[600px]">
                            <div className="h-32 flex flex-col items-center justify-center w-full">
                                {reloadClicks >= 40 && (
                                    <h1 className={`text-4xl md:text-6xl font-black italic tracking-tighter transition-all duration-1000 animate-in fade-in ${showTitleYellow ? 'text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)]' : 'text-slate-300'}`}>SUPERVOTER</h1>
                                )}
                            </div>
                            <div className="h-[280px] flex flex-col items-center justify-center w-full relative">
                                {!hideErrorText && (
                                    <div className={`flex flex-col items-center transition-all duration-[1500ms] ${reloadClicks >= 15 ? 'fall' : ''}`}>
                                        <svg className="text-slate-300 mb-6" width="72" height="92" viewBox="0 0 72 92" fill="none">
                                            <path d="M44 2H10C5.58172 2 2 5.58172 2 10V82C2 86.4183 5.58172 90 10 90H62C66.4183 90 70 86.4183 70 82V28L44 2Z" stroke="currentColor" strokeWidth="4" strokeLinejoin="round"/>
                                            <path d="M44 2V28H70" stroke="currentColor" strokeWidth="4" strokeLinejoin="round"/>
                                            <circle cx="26" cy="54" r="4" fill="currentColor"/><circle cx="46" cy="54" r="4" fill="currentColor"/>
                                            <rect x="26" y="72" width="20" height="4" rx="2" fill="currentColor"/>
                                        </svg>
                                        <h2 className="text-2xl font-semibold text-gray-800 mb-2 text-center">This page isn't working</h2>
                                        <p className="text-gray-500 text-sm mb-4 text-center italic tracking-tight">HTTP ERROR 400</p>
                                    </div>
                                )}
                            </div>
                            <div className="h-20 flex flex-col items-center justify-start w-full">
                                {!isRebooting ? (
                                    <button onClick={handleReloadClick} className="bg-[#1a73e8] hover:bg-[#1557b0] active:scale-95 transition-all text-white px-10 py-3 rounded shadow-md font-medium">Reload</button>
                                ) : (
                                    <div className="text-slate-500 font-black italic tracking-widest animate-pulse mt-4 uppercase">REBOOTING...</div>
                                )}
                            </div>
                            <div className="flex-1 flex flex-col items-center justify-end w-full pb-8">
                                {showBar && (
                                    <div className={`w-full space-y-2 animate-in slide-in-from-bottom-10 transition-opacity duration-1000 ${isDarkening ? 'opacity-100' : 'opacity-40'}`}>
                                        <div className="flex justify-between text-[10px] font-black tracking-widest text-slate-500 italic">
                                            <span>LOCAL WAR PROGRESS SAVED</span>
                                            <span>{Math.round(percA)}% VS {Math.round(percB)}%</span>
                                        </div>
                                        <div className="h-4 w-full bg-slate-200 rounded-full overflow-hidden flex border border-slate-300/30">
                                            <div className="h-full bg-red-600 transition-all duration-700" style={{ width: `${percA}%` }} />
                                            <div className="h-full bg-blue-600 transition-all duration-700" style={{ width: `${percB}%` }} />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen select-none overflow-hidden flex flex-col items-center justify-center p-4 
                    ${combo >= 900 ? 'bg-gradient-to-br from-red-900/20 via-slate-900 to-blue-900/20 animate-pulse' : ''} 
                    ${(combo >= 500 && combo < 900) ? 'bg-white invert transition-all duration-[1000ms]' : 'bg-slate-950 transition-all duration-[1500ms]'}`}>
                    <div className="fixed inset-0 pointer-events-none z-[100]">
                        {particles.map(p => (
                            <div key={p.id} className="particle" style={{ left: `${p.x}%`, top: `${p.y}%`, '--tx': `${p.tx}px`, '--ty': `${p.ty}px`, '--rot': `${p.rotation}deg`, fontSize: `${p.size}px`, backgroundColor: p.emoji ? 'transparent' : p.color, width: p.emoji ? 'auto' : '6px', height: p.emoji ? 'auto' : '6px', borderRadius: '2px' }}>{p.emoji}</div>
                        ))}
                    </div>
                    <div className={`w-full max-w-xl relative z-10 transition-all duration-[1500ms] ${combo >= 500 ? 's-3' : combo >= 100 ? 's-2' : combo >= 50 ? 's-1' : ''}`}>
                        <header className="text-center mb-6">
                            <h1 className={`text-4xl md:text-6xl font-black italic tracking-tighter transition-all duration-[1000ms] flex justify-center items-center gap-1 ${combo >= 10 ? 'text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)]' : 'text-slate-100'}`}>
                                <span className={combo >= 400 ? 'fall' : (isRecovering && lastMaxCombo >= 400 ? 'rec' : '')}>SUPER</span>
                                <span className={combo >= 700 ? 'glitch' : ''}>VOTE</span>
                                <span className={combo >= 150 ? 'fall' : (isRecovering && lastMaxCombo >= 150 ? 'rec' : '')}>R</span>
                            </h1>
                            <div className="h-14 mt-4 flex justify-center items-center">
                                {combo > 2 && (
                                    <span className="bg-white text-black px-6 py-2 rounded-full font-black text-2xl shadow-[6px_6px_0px_#ef4444] animate-bounce">
                                        <span className="italic">{combo}</span>x
                                    </span>
                                )}
                            </div>
                        </header>
                        <div className="grid grid-cols-2 gap-4 h-48 md:h-64">
                            <div className={`h-full transition-all duration-[1200ms] ${(leastClicked === 'A' && combo >= 300) ? 'fall' : (leastClicked === 'A' && combo >= 250) ? 'dan' : (isRecovering && lastMaxCombo >= 300 && leastClicked === 'A' ? 'rec' : '')}`}>
                                <button onPointerDown={(e) => { e.preventDefault(); handleSpam('optionA', true); }} className={`w-full h-full relative rounded-3xl border-4 transition-all active:scale-95 flex flex-col items-center justify-center p-4 ${combo >= 200 ? 'border-red-400 bg-red-600 shadow-[0_0_30px_rgba(239,68,68,0.5)]' : 'border-red-900 bg-red-950'}`}>
                                    <span className="relative text-red-500 font-black text-sm italic uppercase tracking-widest">Red Squad</span>
                                    <span className="relative text-white font-black text-4xl">{pollData.optionA.toLocaleString()}</span>
                                </button>
                            </div>
                            <div className={`h-full transition-all duration-[1200ms] ${(leastClicked === 'B' && combo >= 300) ? 'fall' : (leastClicked === 'B' && combo >= 250) ? 'dan' : (isRecovering && lastMaxCombo >= 300 && leastClicked === 'B' ? 'rec' : '')}`}>
                                <button onPointerDown={(e) => { e.preventDefault(); handleSpam('optionB', false); }} className={`w-full h-full relative rounded-3xl border-4 transition-all active:scale-95 flex flex-col items-center justify-center p-4 ${combo >= 200 ? 'border-blue-400 bg-blue-600 shadow-[0_0_30px_rgba(59,130,246,0.5)]' : 'border-blue-900 bg-blue-950'}`}>
                                    <span className="relative text-blue-500 font-black text-sm italic uppercase tracking-widest">Blue Squad</span>
                                    <span className="relative text-white font-black text-4xl">{pollData.optionB.toLocaleString()}</span>
                                </button>
                            </div>
                        </div>
                        <div className={`mt-10 space-y-2 transition-all duration-[1500ms] ${combo >= 400 ? 'fall-bar' : (isRecovering && lastMaxCombo >= 400 ? 'rec' : 'opacity-100')}`}>
                            <div className="h-8 w-full bg-black rounded-full overflow-hidden flex border-4 border-slate-900 shadow-lg">
                                <div className="h-full bg-red-600 transition-all duration-700 relative border-r-2 border-white/20" style={{ width: `${percA}%` }} />
                                <div className="h-full bg-blue-600 transition-all duration-700 relative" style={{ width: `${percB}%` }} />
                            </div>
                        </div>
                        <footer className="mt-8 text-center opacity-20 hover:opacity-100 transition-opacity duration-[1000ms]">
                            <button onClick={() => {
                                setPollData({ optionA: 0, optionB: 0 });
                                localStorage.removeItem('supervoter_data');
                            }} className="text-[10px] text-slate-500 hover:text-rose-500 uppercase font-bold tracking-widest transition-colors">Reset Local War Data</button>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
